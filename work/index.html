  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.13/dist/lenis.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" defer></script>
  <script>
    var cv = document.getElementById('cv'), sw = document.getElementById('sw'), fw = document.getElementById('fw');
    var ps = ['p1','p2','p3','p4','p5','p6'].map(function(id){return document.getElementById(id);});
    var isOpen = false, tl = null, TO = 'center bottom', OA = [32, 26, 20, 15, 10, 6];

    function openF(){
      if(isOpen) return;
      isOpen = true;
      if(tl) tl.kill();
      tl = gsap.timeline();
      tl.to([cv,sw], {rotateX: 18, duration: .15, ease: 'power1.out', transformOrigin: TO})
        .to([cv,sw], {rotateX: 58, duration: .58, ease: 'power2.out', transformOrigin: TO});
      ps.forEach(function(p, i){
        tl.to(p, {rotateX: OA[i], duration: .52, ease: 'power2.out', transformOrigin: TO}, '.12');
      });
    }

    function closeF(){
      if(!isOpen) return;
      isOpen = false;
      if(tl) tl.kill();
      tl = gsap.timeline();
      tl.to(ps.slice().reverse(), {rotateX: 0, transformOrigin: TO, duration: .36, ease: 'power2.in', stagger: .05});
      tl.to([cv,sw], {rotateX: 12, duration: .44, ease: 'power2.out', transformOrigin: TO}, '-=.26');
    }

    fw.addEventListener('mouseenter', openF);
    fw.addEventListener('mouseleave', closeF);
    fw.addEventListener('click', function(){isOpen ? closeF() : openF();});
    gsap.set([cv, sw], {rotateX: 12, transformOrigin: TO});
    setTimeout(openF, 800);
  </script>

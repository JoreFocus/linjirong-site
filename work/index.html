  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.13/dist/lenis.min.js" defer></script>
  <script src="/assets/js/site.js" defer></script>
  <script>
    (function () {
      var folder = document.getElementById('folder');
      var target = document.getElementById('projects');
      if (!folder || !target) return;
      var coarse = matchMedia('(hover: none)').matches;

      folder.addEventListener('click', function (e) {
        e.preventDefault();
        // 触屏:第一下打开文件夹,第二下才进去
        if (coarse && !folder.classList.contains('open')) {
          folder.classList.add('open');
          return;
        }
        if (window.__lenis) { window.__lenis.scrollTo(target); }
        else { target.scrollIntoView({ behavior: 'smooth' }); }
      });

      document.addEventListener('click', function (e) {
        if (!folder.contains(e.target)) folder.classList.remove('open');
      });
    })();
  </script>
